name: Payment Gateway Stress Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  run-k6-stress:
    name: Execute k6 Load Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Run k6 immediately (It's already built into this action!)
      - name: Run k6 Load Test Routine
        uses: k6io/action@v0.2.0
        with:
          filename: payment_stress_test.js

      # Step 3: Commit the dashboard back to your repository
      - name: Commit and Push HTML Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add summary.html
          git diff-index --quiet HEAD || git commit -m "docs: automated update of k6 performance report [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
